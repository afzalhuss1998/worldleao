<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saiexch Support - WhatsApp Message</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Saiexch Support - WhatsApp Message</h1>

  <div class="tabs">
    <div class="tab active" onclick="showLang('en', this)">English</div>
    <div class="tab" onclick="showLang('hi', this)"> Hindi</div>
    <div class="tab" onclick="showLang('kn', this)">Kannada</div>
    <div class="tab" onclick="showLang('ta', this)">Tamil</div>
    <div class="tab" onclick="showLang('te', this)">Telugu</div>
  </div>

  <div class="content visible" id="text">
    FOR !D Message on WhatsApp
  </div>

  <div class="click-direction"> Click below to message on WhatsApp</div>

  <a href="https://wa.me/+917063508912?text=FOR%20!D" class="whatsapp-btn" target="_blank">
    Message on WhatsApp
  </a>

  <!-- Saiexch Logo -->
  <div class="logo">
    <img src="logo.png" alt="Saiexch Logo" />
  </div>

  <script>
    const messages = {
      en: "FOR !D Message on WhatsApp",
      hi: "!D  WhatsApp   ",
      kn: "!D WhatsApp   ",
      ta: "!D WhatsApp  ",
      te: "!D WhatsApp  "
    };

    function showLang(lang, el) {
      const content = document.getElementById("text");
      content.classList.remove("visible");
      setTimeout(() => {
        content.innerText = messages[lang];
        content.classList.add("visible");
      }, 150);

      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      el.classList.add('active');
    }
  </script>

</body>
</html>
